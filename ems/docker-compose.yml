services:
    app:
        build: .
        container_name: ems_app
        ports: ["7080:8080"]
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/public/build
            - /var/www/html/node_modules
        environment: &env
            DB_CONNECTION: ${DB_CONNECTION}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
        networks:
            - appnet
        depends_on:
            - db

    worker:
        build: .
        container_name: ems_worker
        working_dir: /var/www/html
        volumes:
          - .:/var/www/html
          - /var/www/html/vendor
        environment:
          <<: *env
        networks:
          - appnet
        command: php artisan queue:work --verbose --tries=3
        depends_on:
          - db
          - app

    db:
        image: mariadb:10.11
        container_name: ems_db
        environment:
            MARIADB_DATABASE: ${DB_DATABASE}
            MARIADB_USER: ${DB_USERNAME}
            MARIADB_PASSWORD: ${DB_PASSWORD}
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        ports: ["7306:3306"]
        volumes:
            - dbdata:/var/lib/mysql
        networks: [appnet]

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: ems_pma
        ports: ["7111:80"]
        environment:
            PMA_HOST: db
        depends_on: [db]
        networks: [appnet]

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: eventra_tunnel
        restart: always
        environment:
            - TUNNEL_TOKEN=${TUNNEL_TOKEN}
        command: tunnel --no-autoupdate run --protocol http2
        depends_on:
            - app

networks:
    appnet:

volumes:
    dbdata:
